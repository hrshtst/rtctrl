# roki-gl build config override (see tools/bootstrap_milib.sh).
# Identical to upstream config.org except CONFIG_USE_MAGICKWAND=n:
# rkgl_texture.c includes the ImageMagick 6 header path
# (wand/MagickWand.h), which no longer exists with system ImageMagick 7.
PREFIX=${HOME}/usr
STD=

# libGL and libGLU required.

# MagickWand (C API of ImageMagick) support
CONFIG_USE_MAGICKWAND=n

# GLX
# (ZX11 and libGLX required.)
CONFIG_USE_GLX=y

# GLUT
# (libglut required.)
CONFIG_USE_GLUT=y

# GLFW
# (libglfw required.)
CONFIG_USE_GLFW=y

# GLEW
# (libGLEW required.)
CONFIG_USE_GLEW=y

# LIW
# (only for applications)
CONFIG_USE_LIW=y
