# zx11 build config override (see tools/bootstrap_milib.sh).
# Identical to upstream config.org except CONFIG_USE_MAGICKWAND=n:
# the pinned zx11 source includes the ImageMagick 6 header path
# (wand/MagickWand.h), which no longer exists with system ImageMagick 7.
# PNG/JPEG/TIFF/WebP backends cover image I/O for rk_anim capture.
PREFIX=${HOME}/usr
STD=

# X extension include
# (libXext required)
CONFIG_USE_XEXT=y

# Xft and fontconfig support
# (libfontconfig and libXft required)
CONFIG_USE_XFT=y

# X pixmap support
# (libxpm required)
CONFIG_USE_XPM=y

# original widget
CONFIG_USE_WIDGET=y

# MagickWand (C API of ImageMagick) support
CONFIG_USE_MAGICKWAND=n

# PNG (Portable Network Graphics) format support
# (libz and libpng required)
CONFIG_USE_PNG=y

# TIFF (Tag Image File Format) format support
# (libtiff required)
CONFIG_USE_TIFF=y

# JPEG format support
# (libjpeg required)
CONFIG_USE_JPEG=y

# WebP format support
# (libwebp required)
CONFIG_USE_WEBP=y

# DIB (Microsoft Device Independent Bitmap, BMP) format support
CONFIG_USE_DIB=y

# MAG (MAki-chan Graphics) format support
CONFIG_USE_MAG=y

# PDT (graphics format for AVG32) support
CONFIG_USE_PDT=y
